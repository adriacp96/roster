<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabin Crew Roster to Calendar</title>
    <!-- Incluir FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css' rel='stylesheet' />
    <!-- Incluir Bootstrap CSS -->
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css' rel='stylesheet' />
    <style>
        #calendar {
            max-width: 900px;
            margin: 20px auto;
        }
        .file-input-container {
            margin-bottom: 20px;
        }
        #downloadLink {
            display: none;
            margin-top: 10px;
        }
        #debugOutput {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mt-4">Convertir Horario de Cabin Crew a Calendario</h1>
        <div class="file-input-container">
            <label for="rosterFile" class="form-label">Selecciona un archivo PDF con el roster:</label>
            <input type="file" class="form-control" id="rosterFile" accept=".pdf">
        </div>
        <div id="calendar"></div>
        <a id="downloadLink" class="btn btn-success" href="#" download="roster.ics">Descargar Calendario ICS</a>
        <div id="debugOutput">Esperando archivo...</div>
    </div>

    <!-- Incluir FullCalendar JS y dependencias -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.js'></script>
    <script src='https://code.jquery.com/jquery-3.6.0.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js'></script>
    <!-- Incluir pdf.js -->
    <script src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js'></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                events: [],
                eventContent: function(arg) {
                    return { html: `<b>${arg.event.title}</b><br>${arg.event.extendedProps.details}` };
                }
            });
            calendar.render();

            var fileInput = document.getElementById('rosterFile');
            var downloadLink = document.getElementById('downloadLink');
            var debugOutput = document.getElementById('debugOutput');

            fileInput.addEventListener('change', async function() {
                var file = fileInput.files[0];
                if (file) {
                    debugOutput.innerHTML = 'Procesando archivo PDF...<br>';
                    try {
                        var content = await extractTextFromPDF(file);
                        debugOutput.innerHTML += 'Texto extraído del PDF:<br>' + content.replace(/\n/g, '<br>') + '<br>';
                        var { events, icsContent, year, month } = parseRosterText(content);
                        if (events.length > 0) {
                            calendar.removeAllEvents();
                            calendar.addEventSource(events);
                            calendar.gotoDate(`${year}-${month}-01`);
                            debugOutput.innerHTML += `Se encontraron ${events.length} eventos para ${month}/${year}.<br>`;
                        } else {
                            debugOutput.innerHTML += 'No se encontraron eventos en el roster.<br>';
                        }

                        if (icsContent) {
                            var blob = new Blob([icsContent], { type: 'text/calendar' });
                            downloadLink.href = URL.createObjectURL(blob);
                            downloadLink.download = `roster_${year}-${month}.ics`;
                            downloadLink.style.display = 'block';
                            debugOutput.innerHTML += 'Archivo ICS generado y listo para descargar.<br>';
                        } else {
                            debugOutput.innerHTML += 'No se pudo generar el archivo ICS.<br>';
                        }
                    } catch (error) {
                        debugOutput.innerHTML += `Error: ${error.message}<br>`;
                    }
                } else {
                    debugOutput.innerHTML = 'Por favor, selecciona un archivo PDF.<br>';
                }
            });

            async function extractTextFromPDF(file) {
                try {
                    var arrayBuffer = await file.arrayBuffer();
                    var pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                    var text = '';
                    for (var i = 1; i <= pdf.numPages; i++) {
                        var page = await pdf.getPage(i);
                        var content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(' ') + '\n';
                    }
                    return text;
                } catch (error) {
                    throw new Error(`Error al extraer texto del PDF: ${error.message}`);
                }
            }

            function parseRosterText(content) {
                var events = [];
                var icsEvents = [];
                var lines = content.split('\n').map(line => line.trim());

                // Extraer el mes y año del encabezado (ej. "1-3-2025 to 31-3-2025")
                var dateMatch = content.match(/(\d+)-(\d+)-(\d+)\s+to\s+(\d+)-(\d+)-(\d+)/);
                var month = dateMatch ? String(dateMatch[2]).padStart(2, '0') : '03';
                var year = dateMatch ? dateMatch[3] : '2025';
                debugOutput.innerHTML += `Mes detectado: ${month}, Año: ${year}<br>`;

                var inDetailsTable = false;
                var currentDate = null;
                var currentFlights = [];

                lines.forEach((line, index) => {
                    if (line.match(/Date\s+Type\s+Rep\.\s+time/i)) {
                        inDetailsTable = true;
                    } else if (inDetailsTable && line.match(/^\d{2}\s+[A-Za-z]{3}/)) {
                        if (currentDate && currentFlights.length > 0) {
                            var event = createEventFromFlights(currentDate, currentFlights, year, month);
                            events.push(event);
                            icsEvents.push(createICSEvent(currentDate, currentFlights, year, month));
                        }
                        currentDate = line.match(/^(\d{2})\s+[A-Za-z]{3}/)[1];
                        currentFlights = [];
                    } else if (inDetailsTable && line.match(/\d{2}:\d{2}/)) {
                        var parts = line.split(/\s+/).filter(p => p);
                        if (parts.length >= 8) {
                            var repTime = parts[0] || '';
                            var flightNo = parts[2] || '';
                            var fromStation = parts[3] || '';
                            var fromTime = parts[4] || '';
                            var toStation = parts[5] || '';
                            var toTime = parts[6] || '';
                            var duration = parts[7] || '';
                            currentFlights.push({
                                repTime, flightNo, fromStation, fromTime, toStation, toTime, duration
                            });
                            debugOutput.innerHTML += `Vuelo añadido: ${flightNo} (${fromStation} -> ${toStation})<br>`;
                        }
                    } else if (line.match(/^\|\s*\d{2}\s*\|/)) {
                        var day = line.match(/^\|\s*(\d{2})\s*\|/)[1];
                        var typeMatch = line.match(/\|\s*([^\s|]+)\s*\|/);
                        var type = typeMatch ? typeMatch[1] : 'xx';
                        if (type !== 'xx') {
                            events.push({
                                title: `Turno ${type}`,
                                start: `${year}-${month}-${day.padStart(2, '0')}`,
                                extendedProps: { details: 'Ver detalles de vuelo' }
                            });
                            icsEvents.push(createICSTurn(day, year, month));
                            debugOutput.innerHTML += `Turno ${type} añadido para ${day}<br>`;
                        } else {
                            events.push({
                                title: 'Día libre',
                                start: `${year}-${month}-${day.padStart(2, '0')}`,
                                extendedProps: { details: 'Sin asignación' },
                                color: '#28a745'
                            });
                            icsEvents.push(createICSFreeDay(day, year, month));
                            debugOutput.innerHTML += `Día libre añadido para ${day}<br>`;
                        }
                    }
                });

                if (currentDate && currentFlights.length > 0) {
                    var event = createEventFromFlights(currentDate, currentFlights, year, month);
                    events.push(event);
                    icsEvents.push(createICSEvent(currentDate, currentFlights, year, month));
                }

                var icsContent = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//xAI Grok 3//Cabin Crew Roster//EN
${icsEvents.join('\n')}
END:VCALENDAR`;

                return { events, icsContent, year, month };
            }

            function createEventFromFlights(date, flights, year, month) {
                var details = flights.map(f => `${f.flightNo}: ${f.fromStation} (${f.fromTime}) -> ${f.toStation} (${f.toTime}), Dur: ${f.duration}`).join('<br>');
                return {
                    title: `Vuelo(s) ${flights[0].flightNo}`,
                    start: `${year}-${month}-${date.padStart(2, '0')}`,
                    extendedProps: { details: details },
                    color: '#007bff'
                };
            }

            function createICSEvent(date, flights, year, month) {
                var startDate = new Date(`${year}-${month}-${date.padStart(2, '0')} ${flights[0].repTime || '00:00'}`);
                var duration = flights.reduce((total, f) => total + parseDuration(f.duration), 0) * 60 * 60 * 1000;
                var endDate = new Date(startDate.getTime() + duration);

                var details = flights.map(f => `${f.flightNo}: ${f.fromStation} (${f.fromTime}) -> ${f.toStation} (${f.toTime}), Dur: ${f.duration}h`).join('\\n');
                return `BEGIN:VEVENT
UID:${Date.now()}-${date}@xai.com
DTSTAMP:${formatICSDate(new Date())}
DTSTART:${formatICSDate(startDate)}
DTEND:${formatICSDate(endDate)}
SUMMARY:Vuelo(s) ${flights[0].flightNo}
DESCRIPTION:${details}
END:VEVENT`;
            }

            function createICSFreeDay(date, year, month) {
                var startDate = new Date(`${year}-${month}-${date.padStart(2, '0')}`);
                var endDate = new Date(startDate.getTime() + 24 * 60 * 60 * 1000);
                return `BEGIN:VEVENT
UID:${Date.now()}-${date}@xai.com
DTSTAMP:${formatICSDate(new Date())}
DTSTART:${formatICSDate(startDate)}
DTEND:${formatICSDate(endDate)}
SUMMARY:Día libre
DESCRIPTION:Sin asignación
END:VEVENT`;
            }

            function createICSTurn(date, year, month) {
                var startDate = new Date(`${year}-${month}-${date.padStart(2, '0')}`);
                var endDate = new Date(startDate.getTime() + 24 * 60 * 60 * 1000);
                return `BEGIN:VEVENT
UID:${Date.now()}-${date}@xai.com
DTSTAMP:${formatICSDate(new Date())}
DTSTART:${formatICSDate(startDate)}
DTEND:${formatICSDate(endDate)}
SUMMARY:Turno
DESCRIPTION:Ver detalles de vuelo
END:VEVENT`;
            }

            function parseDuration(durationStr) {
                var [hours] = durationStr.split(':').map(Number) || [0];
                return hours || 0;
            }

            function formatICSDate(date) {
                return date.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            }
        });
    </script>
</body>
</html>
