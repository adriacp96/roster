<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabin Crew Roster to Calendar</title>
    <!-- Incluir FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css' rel='stylesheet' />
    <!-- Incluir Bootstrap CSS -->
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css' rel='stylesheet' />
    <style>
        #calendar {
            max-width: 900px;
            margin: 20px auto;
        }
        #rosterInput {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mt-4">Convertir Horario de Cabin Crew a Calendario</h1>
        <p>Pega el contenido OCR del roster aquí:</p>
        <textarea id="rosterInput" class="form-control" placeholder="Pega el contenido OCR del roster aquí..."></textarea>
        <button id="parseButton" class="btn btn-primary mt-2">Parsear y Generar Calendario</button>
        <div id="calendar"></div>
    </div>

    <!-- Incluir FullCalendar JS y dependencias -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.js'></script>
    <script src='https://code.jquery.com/jquery-3.6.0.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js'></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                events: [],
                eventContent: function(arg) {
                    return { html: `<b>${arg.event.title}</b><br>${arg.event.extendedProps.details}` };
                }
            });
            calendar.render();

            document.getElementById('parseButton').addEventListener('click', function() {
                var rosterText = document.getElementById('rosterInput').value;
                if (rosterText) {
                    var events = parseRosterText(rosterText);
                    calendar.removeAllEvents();
                    calendar.addEventSource(events);
                } else {
                    alert('Por favor, pega el contenido del roster.');
                }
            });

            function parseRosterText(text) {
                var events = [];
                var lines = text.split('\n');
                var inDetailsTable = false;
                var currentDate = null;
                var currentFlights = [];

                lines.forEach(line => {
                    line = line.trim();
                    if (line.startsWith('| Date')) {
                        inDetailsTable = true;
                    } else if (inDetailsTable && line.match(/^\|\s*\d{2}\s+[A-Za-z]{3}/)) {
                        // Nueva fila de detalles (ej. "01 Sat")
                        if (currentDate && currentFlights.length > 0) {
                            events.push(createEventFromFlights(currentDate, currentFlights));
                        }
                        currentDate = line.match(/^\|\s*(\d{2})\s+[A-Za-z]{3}/)[1];
                        currentFlights = [];
                    } else if (inDetailsTable && line.match(/^\|\s*[0-9:]{4,5}\s*[A-Za-z0-9]{3}\s*/)) {
                        // Línea de vuelo (ej. "06:50 837 DXB 08:21 BAH 08:40 01:19")
                        var parts = line.split('|').map(p => p.trim()).filter(p => p);
                        if (parts.length >= 6) {
                            var repTime = parts[1] || '';
                            var flightNo = parts[2] || '';
                            var fromStation = parts[3] || '';
                            var fromTime = parts[4] || '';
                            var toStation = parts[5] || '';
                            var toTime = parts[6] || '';
                            var duration = parts[7] || '';
                            currentFlights.push({
                                repTime, flightNo, fromStation, fromTime, toStation, toTime, duration
                            });
                        }
                    } else if (line.match(/^\|\s*(\d{2})\s*$/)) {
                        // Día de la vista mensual compacta (ej. "| 01 |")
                        var day = line.match(/^\|\s*(\d{2})\s*\|/)[1];
                        var type = line.match(/\|\s*(\w+)\s*\|/) ? line.match(/\|\s*(\w+)\s*\|/)[1] : 'xx';
                        if (type !== 'xx') {
                            events.push({
                                title: `Turno ${type}`,
                                start: `2025-03-${day.padStart(2, '0')}`,
                                extendedProps: { details: 'Ver detalles de vuelo' }
                            });
                        } else {
                            events.push({
                                title: 'Día libre',
                                start: `2025-03-${day.padStart(2, '0')}`,
                                extendedProps: { details: 'Sin asignación' },
                                color: '#28a745' // Verde para días libres
                            });
                        }
                    }
                });

                // Procesar el último día
                if (currentDate && currentFlights.length > 0) {
                    events.push(createEventFromFlights(currentDate, currentFlights));
                }

                return events;
            }

            function createEventFromFlights(date, flights) {
                var details = flights.map(f => `${f.flightNo}: ${f.fromStation} (${f.fromTime}) -> ${f.toStation} (${f.toTime}), Dur: ${f.duration}`).join('<br>');
                return {
                    title: `Vuelo(s) ${flights[0].flightNo}`,
                    start: `2025-03-${date.padStart(2, '0')}`,
                    extendedProps: { details: details },
                    color: '#007bff' // Azul para vuelos
                };
            }
        });
    </script>
</body>
</html>
