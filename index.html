<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabin Crew Roster to Calendar</title>
    <!-- Incluir FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css' rel='stylesheet' />
    <!-- Incluir Bootstrap CSS -->
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css' rel='stylesheet' />
    <style>
        #calendar {
            max-width: 900px;
            margin: 20px auto;
        }
        .file-input-container {
            margin-bottom: 20px;
        }
        #downloadLink {
            display: none;
            margin-top: 10px;
        }
        #debugOutput {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mt-4">Convertir Horario de Cabin Crew a Calendario</h1>
        <div class="file-input-container">
            <label for="rosterFile" class="form-label">Selecciona un archivo HTML del roster:</label>
            <input type="file" class="form-control" id="rosterFile" accept=".html,.htm">
            <button id="parseButton" class="btn btn-primary mt-2" disabled>Parsear y Generar Calendario</button>
        </div>
        <div id="calendar"></div>
        <a id="downloadLink" class="btn btn-success" href="#" download="roster.ics">Descargar Calendario ICS</a>
        <div id="debugOutput"></div>
    </div>

    <!-- Incluir FullCalendar JS y dependencias -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.js'></script>
    <script src='https://code.jquery.com/jquery-3.6.0.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js'></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                events: [],
                eventContent: function(arg) {
                    return { html: `<b>${arg.event.title}</b><br>${arg.event.extendedProps.details}` };
                }
            });
            calendar.render();

            var fileInput = document.getElementById('rosterFile');
            var parseButton = document.getElementById('parseButton');
            var downloadLink = document.getElementById('downloadLink');
            var debugOutput = document.getElementById('debugOutput');

            fileInput.addEventListener('change', function() {
                parseButton.disabled = !fileInput.files.length;
            });

            parseButton.addEventListener('click', function() {
                var file = fileInput.files[0];
                if (file) {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var htmlContent = e.target.result;
                        debugOutput.style.display = 'block';
                        debugOutput.innerHTML = 'Procesando archivo...<br>';
                        var { events, icsContent } = parseRosterHtml(htmlContent);
                        if (events.length > 0) {
                            calendar.removeAllEvents();
                            calendar.addEventSource(events);
                            debugOutput.innerHTML += `Se encontraron ${events.length} eventos.<br>`;
                        } else {
                            debugOutput.innerHTML += 'No se encontraron eventos en la tabla roster.<br>';
                        }

                        // Generar y configurar el enlace de descarga ICS
                        if (icsContent) {
                            var blob = new Blob([icsContent], { type: 'text/calendar' });
                            downloadLink.href = URL.createObjectURL(blob);
                            downloadLink.download = 'roster_2025-03.ics';
                            downloadLink.style.display = 'block';
                            debugOutput.innerHTML += 'Archivo ICS generado y listo para descargar.<br>';
                        } else {
                            debugOutput.innerHTML += 'No se pudo generar el archivo ICS.<br>';
                        }
                    };
                    reader.onerror = function() {
                        debugOutput.style.display = 'block';
                        debugOutput.innerHTML = 'Error al leer el archivo.<br>';
                    };
                    reader.readAsText(file);
                } else {
                    alert('Por favor, selecciona un archivo.');
                }
            });

            function parseRosterHtml(htmlContent) {
                var events = [];
                var icsEvents = [];
                var parser = new DOMParser();
                var doc = parser.parseFromString(htmlContent, 'text/html');
                var rosterTable = doc.querySelector('table.roster');
                debugOutput.innerHTML += `Tabla roster encontrada: ${rosterTable ? 'Sí' : 'No'}<br>`;

                if (rosterTable) {
                    var rows = rosterTable.querySelectorAll('tr');
                    var currentDate = null;
                    var currentFlights = [];

                    rows.forEach((row, index) => {
                        var cols = row.querySelectorAll('td, th');
                        if (cols.length > 0) {
                            debugOutput.innerHTML += `Procesando fila ${index}: ${cols.length} columnas<br>`;
                            var dateCell = Array.from(cols).find(col => col.textContent.trim().match(/(\d{1,2})\s+[A-Za-z]{3}/));
                            if (dateCell) {
                                var dateMatch = dateCell.textContent.trim().match(/(\d{1,2})\s+[A-Za-z]{3}/);
                                if (dateMatch) {
                                    // Procesar vuelos anteriores
                                    if (currentDate && currentFlights.length > 0) {
                                        var event = createEventFromFlights(currentDate, currentFlights);
                                        events.push(event);
                                        icsEvents.push(createICSEvent(currentDate, currentFlights));
                                        debugOutput.innerHTML += `Evento creado para ${currentDate}<br>`;
                                    }
                                    currentDate = dateMatch[1];
                                    currentFlights = [];
                                }
                            }

                            // Extraer detalles de vuelo
                            if (cols.length >= 6) {
                                var flightData = Array.from(cols).slice(1).map(col => col.textContent.trim());
                                var repTime = flightData[0] || '';
                                var flightNo = flightData[1] || '';
                                var fromStation = flightData[2] || '';
                                var fromTime = flightData[3] || '';
                                var toStation = flightData[4] || '';
                                var toTime = flightData[5] || '';
                                var duration = flightData[6] || '';

                                if (flightNo) {
                                    currentFlights.push({
                                        repTime, flightNo, fromStation, fromTime, toStation, toTime, duration
                                    });
                                    debugOutput.innerHTML += `Vuelo añadido: ${flightNo} (${fromStation} -> ${toStation})<br>`;
                                }
                            } else if (cols.length === 1 && cols[0].textContent.trim().toLowerCase() === 'xx') {
                                // Día libre
                                var eventDate = `2025-03-${currentDate.padStart(2, '0')}`;
                                events.push({
                                    title: 'Día libre',
                                    start: eventDate,
                                    extendedProps: { details: 'Sin asignación' },
                                    color: '#28a745'
                                });
                                icsEvents.push(createICSFreeDay(eventDate));
                                debugOutput.innerHTML += `Día libre añadido para ${currentDate}<br>`;
                            }
                        }
                    });

                    // Procesar el último día
                    if (currentDate && currentFlights.length > 0) {
                        var event = createEventFromFlights(currentDate, currentFlights);
                        events.push(event);
                        icsEvents.push(createICSEvent(currentDate, currentFlights));
                        debugOutput.innerHTML += `Evento final creado para ${currentDate}<br>`;
                    }
                }

                // Generar contenido ICS
                var icsContent = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//xAI Grok 3//Cabin Crew Roster//EN
${icsEvents.join('\n')}
END:VCALENDAR`;

                return { events, icsContent };
            }

            function createEventFromFlights(date, flights) {
                var details = flights.map(f => `${f.flightNo}: ${f.fromStation} (${f.fromTime}) -> ${f.toStation} (${f.toTime}), Dur: ${f.duration}`).join('<br>');
                return {
                    title: `Vuelo(s) ${flights[0].flightNo}`,
                    start: `2025-03-${date.padStart(2, '0')}`,
                    extendedProps: { details: details },
                    color: '#007bff'
                };
            }

            function createICSEvent(date, flights) {
                var startDate = new Date(`2025-03-${date.padStart(2, '0')} ${flights[0].repTime || '00:00'}`);
                var duration = flights.reduce((total, f) => total + parseDuration(f.duration), 0);
                var endDate = new Date(startDate.getTime() + duration * 60 * 60 * 1000);

                var details = flights.map(f => `${f.flightNo}: ${f.fromStation} (${f.fromTime}) -> ${f.toStation} (${f.toTime}), Dur: ${f.duration}h`).join('\\n');
                return `BEGIN:VEVENT
UID:${Date.now()}-${date}@xai.com
DTSTAMP:${formatICSDate(new Date())}
DTSTART:${formatICSDate(startDate)}
DTEND:${formatICSDate(endDate)}
SUMMARY:Vuelo(s) ${flights[0].flightNo}
DESCRIPTION:${details}
END:VEVENT`;
            }

            function createICSFreeDay(date) {
                var startDate = new Date(date);
                var endDate = new Date(startDate.getTime() + 24 * 60 * 60 * 1000);
                return `BEGIN:VEVENT
UID:${Date.now()}-${date}@xai.com
DTSTAMP:${formatICSDate(new Date())}
DTSTART:${formatICSDate(startDate)}
DTEND:${formatICSDate(endDate)}
SUMMARY:Día libre
DESCRIPTION:Sin asignación
END:VEVENT`;
            }

            function parseDuration(durationStr) {
                var [hours] = durationStr.split(':').map(Number) || [0];
                return hours || 0;
            }

            function formatICSDate(date) {
                return date.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            }
        });
    </script>
</body>
</html>
