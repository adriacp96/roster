<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabin Crew Roster to Calendar</title>
    <!-- Incluir FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css' rel='stylesheet' />
    <!-- Incluir Bootstrap CSS -->
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css' rel='stylesheet' />
    <style>
        #calendar {
            max-width: 900px;
            margin: 20px auto;
        }
        .file-input-container {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mt-4">Convertir Horario de Cabin Crew a Calendario</h1>
        <div class="file-input-container">
            <label for="rosterFile" class="form-label">Selecciona un archivo HTML del roster:</label>
            <input type="file" class="form-control" id="rosterFile" accept=".html,.htm">
            <button id="parseButton" class="btn btn-primary mt-2" disabled>Parsear y Generar Calendario</button>
        </div>
        <div id="calendar"></div>
    </div>

    <!-- Incluir FullCalendar JS y dependencias -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.js'></script>
    <script src='https://code.jquery.com/jquery-3.6.0.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js'></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                events: [],
                eventContent: function(arg) {
                    return { html: `<b>${arg.event.title}</b><br>${arg.event.extendedProps.details}` };
                }
            });
            calendar.render();

            var fileInput = document.getElementById('rosterFile');
            var parseButton = document.getElementById('parseButton');

            fileInput.addEventListener('change', function() {
                parseButton.disabled = !fileInput.files.length;
            });

            parseButton.addEventListener('click', function() {
                var file = fileInput.files[0];
                if (file) {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var htmlContent = e.target.result;
                        var events = parseRosterHtml(htmlContent);
                        calendar.removeAllEvents();
                        calendar.addEventSource(events);
                    };
                    reader.readAsText(file);
                } else {
                    alert('Por favor, selecciona un archivo.');
                }
            });

            function parseRosterHtml(htmlContent) {
                var events = [];
                var parser = new DOMParser();
                var doc = parser.parseFromString(htmlContent, 'text/html');
                var rosterTable = doc.querySelector('table.roster');

                if (rosterTable) {
                    var rows = rosterTable.querySelectorAll('tbody tr');
                    var currentDate = null;
                    var currentFlights = [];

                    rows.forEach(row => {
                        var cols = row.querySelectorAll('td');
                        if (cols.length > 0) {
                            var dateCell = cols[0].textContent.trim().match(/(\d{2})\s+[A-Za-z]{3}/);
                            if (dateCell) {
                                // Nueva fecha encontrada, procesar vuelos anteriores
                                if (currentDate && currentFlights.length > 0) {
                                    events.push(createEventFromFlights(currentDate, currentFlights));
                                }
                                currentDate = dateCell[1];
                                currentFlights = [];
                            }

                            // Extraer detalles de vuelo si hay múltiples columnas
                            if (cols.length >= 6) {
                                var repTime = cols[1].textContent.trim() || '';
                                var flightNo = cols[2].textContent.trim() || '';
                                var fromStation = cols[3].textContent.trim() || '';
                                var fromTime = cols[4].textContent.trim() || '';
                                var toStation = cols[5].textContent.trim() || '';
                                var toTime = cols[6].textContent.trim() || '';
                                var duration = cols[7] ? cols[7].textContent.trim() : '';

                                if (flightNo) {
                                    currentFlights.push({
                                        repTime, flightNo, fromStation, fromTime, toStation, toTime, duration
                                    });
                                }
                            } else if (cols.length === 1 && cols[0].textContent.trim() === 'xx') {
                                // Día libre
                                events.push({
                                    title: 'Día libre',
                                    start: `2025-03-${currentDate.padStart(2, '0')}`,
                                    extendedProps: { details: 'Sin asignación' },
                                    color: '#28a745'
                                });
                            }
                        }
                    });

                    // Procesar el último día
                    if (currentDate && currentFlights.length > 0) {
                        events.push(createEventFromFlights(currentDate, currentFlights));
                    }
                }

                return events;
            }

            function createEventFromFlights(date, flights) {
                var details = flights.map(f => `${f.flightNo}: ${f.fromStation} (${f.fromTime}) -> ${f.toStation} (${f.toTime}), Dur: ${f.duration}`).join('<br>');
                return {
                    title: `Vuelo(s) ${flights[0].flightNo}`,
                    start: `2025-03-${date.padStart(2, '0')}`,
                    extendedProps: { details: details },
                    color: '#007bff'
                };
            }
        });
    </script>
</body>
</html>
